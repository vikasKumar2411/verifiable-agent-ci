name: VACI (verifiable agent CI)

on:
  workflow_call:
    inputs:
      python_version:
        type: string
        default: "3.11"
      policy_id:
        type: string
        default: "demo"
      policy_path:
        type: string
        default: "demo/policy.json"
      out_dir:
        type: string
        default: ".vaci"
      require_finalized:
        type: boolean
        default: true
      enforce_policy:
        type: boolean
        default: false
    secrets:
      VACI_GATEWAY_KEY_JSON:
        required: false

jobs:
  vaci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # Use a stable signer if present, otherwise generate one (fork-friendly).
      - name: Write gateway key (from secret)
        if: ${{ secrets.VACI_GATEWAY_KEY_JSON != '' }}
        env:
          VACI_GATEWAY_KEY_JSON: ${{ secrets.VACI_GATEWAY_KEY_JSON }}
        run: |
          mkdir -p .vaci_keys
          printf "%s" "$VACI_GATEWAY_KEY_JSON" > .vaci_keys/gateway_ed25519.key
          chmod 600 .vaci_keys/gateway_ed25519.key

      - name: Generate gateway key (fallback for forks)
        if: ${{ secrets.VACI_GATEWAY_KEY_JSON == '' }}
        run: |
          mkdir -p .vaci_keys
          python -m vaci.cli keygen --out .vaci_keys/gateway_ed25519.key

      - name: Prepare trust store (pin this signer)
        run: |
          python - <<'PY'
          import json, base64, hashlib
          from pathlib import Path

          kf = Path(".vaci_keys/gateway_ed25519.key")
          data = json.loads(kf.read_text(encoding="utf-8"))
          pub_raw = base64.urlsafe_b64decode(data["pubkey_b64"] + "==")
          key_id = hashlib.sha256(pub_raw).hexdigest()

          out_dir = Path("${{ inputs.out_dir }}")
          out_dir.mkdir(parents=True, exist_ok=True)
          (out_dir / "trusted_keys.json").write_text(
              json.dumps({"trusted_key_ids":[key_id]}, indent=2, sort_keys=True),
              encoding="utf-8"
          )
          print("Pinned trusted key_id:", key_id)
          PY

      - name: Run tests via VACI (produces receipts + manifest)
        run: |
          rm -rf "${{ inputs.out_dir }}"
          mkdir -p "${{ inputs.out_dir }}"

          RID="ci_${{ github.run_id }}_${{ github.run_attempt }}"

          python -m vaci.cli run \
            --out-dir "${{ inputs.out_dir }}" \
            --keyfile .vaci_keys/gateway_ed25519.key \
            --run-id "$RID" \
            --policy-id "${{ inputs.policy_id }}" \
            --policy-path "${{ inputs.policy_path }}" \
            -- echo "hello from CI"

          python -m vaci.cli run \
            --out-dir "${{ inputs.out_dir }}" \
            --keyfile .vaci_keys/gateway_ed25519.key \
            --run-id "$RID" \
            --policy-id "${{ inputs.policy_id }}" \
            --policy-path "${{ inputs.policy_path }}" \
            -- pytest -q

      - name: Verify latest receipt (sanity check)
        run: |
          python -m vaci.cli verify \
            --receipt "${{ inputs.out_dir }}/receipt.json" \
            --pubkey "${{ inputs.out_dir }}/public_key_b64.json" \
            --trust "${{ inputs.out_dir }}/trusted_keys.json"

      - name: Finalize manifest
        if: ${{ inputs.require_finalized }}
        run: |
          python -m vaci.cli finalize \
            --manifest "${{ inputs.out_dir }}/run_manifest.json" \
            --keyfile .vaci_keys/gateway_ed25519.key

      - name: Verify manifest
        run: |
          ARGS=""
          if [ "${{ inputs.require_finalized }}" = "true" ]; then
            ARGS="$ARGS --require-finalized"
          fi
          if [ "${{ inputs.enforce_policy }}" = "true" ]; then
            ARGS="$ARGS --enforce-policy"
          fi

          python -m vaci.cli verify-manifest \
            --manifest "${{ inputs.out_dir }}/run_manifest.json" \
            --trust "${{ inputs.out_dir }}/trusted_keys.json" \
            --policy-path "${{ inputs.policy_path }}" \
            $ARGS

      - name: Create portable bundle
        run: |
          python -m vaci.cli bundle \
            --manifest "${{ inputs.out_dir }}/run_manifest.json" \
            --out "${{ inputs.out_dir }}/run_bundle.tgz" \
            --policy-path "${{ inputs.policy_path }}"

      - name: Upload VACI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vaci-artifacts
          path: |
            ${{ inputs.out_dir }}
            .vaci_keys/gateway_ed25519.key